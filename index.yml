#Indentation
chai_type: masala_chai

temperature: hot
servings: 2
brewing_time: 5


chai_recipe:
  base: black_tea
  milk: whole_milk

chai_recipe_two:
  base: black_tea
  milk: whole_milk


# String Data Type

# single line string
chai_name: Masala Chai
description: "Chai with cardamon, ginger"
tagline: 'The best chai in town'

# multi line string

brewing_instruction: |
  boil water
  add tea leaves
  add milk

brewing_instruction_two: >
  boil water
  add tea leaves
  add milk

# Number Data Type

cups_per_day: 3
cups_per_day_two: 0xFF22FF

is_hot: true
add_sugar: yes
add_salt: no
is_instant: off
is_consent: on

# null and ~ are same in yaml(yml)
sweetner: null
alternative_milk: ~

morning_brew: 2025-01-15
local_time: 2025-01-15 08:30:01

#collection(array)
#spices is the list and ginger, cloves, black_pepper, true, 200 are the item

#popular way for list
spices:
  - ginger
  - cloves
  - black_pepper
  - true
  - 200


#Earlier used to use (List)
spices: [cardamom, ginger, cloves]

steeping_times: [3, 2, 1]

#List of list
chai_categories:
  - name: Traditional
    varities:
      - Masala Chai
      - Ginger Chai
      - Cardmon Chai
  - name: Modern
    varities:
      - Vanilla Chai
      - Chocolate Chai

# Dictionary
masala_chai:
  ingredients:
    tea: black_tea
    liquid:
      water: 200ml
      milk: 100ml
    spices:
      ginger: 1_inch
      cinnamon: 1_stick
  preparation:
    method: simmer
    duration: 5_minutes

# List of dictionary
chai_menu:
  - name: Masala Chai
    price: 30
    size: regular
  - name: Ginger Chai
    price: 30
    size: regular

# Anchor OR Alias
default_chai_base: &default_base
  tea: black_tea
  water: 200ml
  brewing_time: 5

morning_chai:
  <<: *default_base #line 114 equal to 109-111 lines.
  milk: 100ml

evening_chai:
  <<: *default_base
  milk: 200ml

#Conversion
zip_code: !!str 12345 #converting into string
count: !!int "123" #converting into integer

#It's set of cardamon, ginger and cloves
unique_spices: !!set
  ? cardamon
  ? ginger
  ? cloves
